<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form method="POST">
    {% csrf_token %}
    <label> Name: </label><br>
    <input name="p_name" placeholder="Enter the product name" type="text"><br>
    <label> Type </label><br>
    <input name="p_type" placeholder="Enter the product type" type="text"><br>
    <label> Price </label><br>
    <input name="p_price" placeholder="Enter the product price" type="number"><br>
    <label> Quantity</label><br>
    <input name="p_quantity" placeholder="Enter the product quantity" type="number"><br>
    <button type="Submit">Add Product </button>


</form>
</body>
</html>
