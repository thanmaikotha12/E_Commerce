<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-primary mb-4">
            Update Product
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Product Name
                </label>

                <input type="text"
                       name="p_name"
                       class="form-control"
                       value="{{product.p_name}}">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Product Type
                </label>

                <input type="text"
                       name="p_type"
                       class="form-control"
                       value="{{product.p_type}}">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Product Price
                </label>

                <input type="number"
                       name="p_price"
                       class="form-control"
                       value="{{product.p_price}}">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Product Quantity
                </label>

                <input type="number"
                       name="p_quantity"
                       class="form-control"
                       value="{{product.p_quantity}}">

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Update Product

            </button>

        </form>

    </div>

</div>

</body>
</html>
